<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Francino Calhas</title>
    <link rel="stylesheet" href="css.css">
    <meta property="og:image"
        content="https://francinocalhas.com.br/wp-content/uploads/2023/04/francino-calhas-logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="imagens/francino-calhas-logo.png">

    <style>
        body {
            background: linear-gradient(135deg, #141414, #141414);
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            background-attachment: fixed;
            min-height: 100%;
            font-family: "DM Sans", "Inter", sans-serif;
        }

        header {
            background: var(--azul-principal);
            backdrop-filter: blur(10px);
            background-position: center;
            background-size: cover;
            top: 0;
            width: 100%;
            height: 80px;
            position: fixed;
            display: flex;
            justify-content: space-between;
        }

        header h1 {
            color: White;
            font-weight: 700;
        }

        .hero {
            background: linear-gradient(135deg, rgba(2, 2, 2, 0.4), rgba(0, 0, 0, 0.8)), url("imagens/home-hd-calhas.jpg");
            background-position: 1% 90%;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 80vh;
            padding-top: 80px;
            align-content: center;
        }

        .hero h1,
        h2 {
            color: white;
            font-weight: 700;
            text-align: center;
            z-index: 2;
            font-size: 2rem;
        }

        .hero h2 {
            font-size: 1.8rem;
            color: var(--cinza-claro);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: 700;
        }

        .logo img {
            margin-left: 20px;
            height: 40px;
        }

        nav {
            align-items: center;
            display: flex;
            gap: 30px;
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: var(--cinza-claro);
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--cinza-claro);
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }

        nav a:hover::after {
            width: 100%;
        }

        main {
            justify-content: center;
            display: flex;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        @media (max-width: 768px) {
            header {
                padding: 0 20px;
            }

            nav {
                gap: 15px;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .hero h2 {
                font-size: 1.2rem;
            }
        }

        .menu {
            background: linear-gradient(135deg, rgb(30, 58, 95, 0.7), rgb(43, 92, 138, 0.9));
            flex: 1 1 18.75rem;
            max-width: 30rem;
            min-height: 25rem;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;

            border-radius: 1.25rem;
            overflow: hidden;
            padding: 1.5rem;

            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .menu:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .menu img {
            width: 100%;
            height: 290px;
            object-fit: cover;
            border-radius: 0.75rem;
        }

        .menu p {
            text-align: center;
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .slider {
            width: 100%;
            overflow: hidden;
            border-radius: 0.75rem;
            position: relative;
        }

        .slides {
            display: flex;
            width: 300%;
            animation: slide3 9s infinite;
        }

        .slides img {
            width: calc(100% / 3);
            height: 290px;
            object-fit: cover;
            border-radius: 0.75rem;
            flex-shrink: 0;
        }

        @keyframes slide3 {
            0% {
                transform: translateX(0%);
            }

            30% {
                transform: translateX(0%);
            }

            35% {
                transform: translateX(-33.333%);
            }

            65% {
                transform: translateX(-33.333%);
            }

            70% {
                transform: translateX(-66.666%);
            }

            95% {
                transform: translateX(-66.666%);
            }

            100% {
                transform: translateX(0%);
            }
        }

        #rain {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <img src="imagens/francino-calhas-logo.png">
            <span>Francino Calhas</span>
        </div>

        <nav>
            <a href="#inicio">Início</a>
            <a href="#servico">Serviços</a>
            <a href="#empresa">A empresa</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>
    <div class="hero">
        <H1>Calhas, coifas e rufos.</H1>
        <h2>Melhor preço de Belo Horizonte, cobrimos qualquer orçamento.</h2>
    </div>
    <h2>Nossos produtos</h2>

    <canvas id="rain"></canvas>

    <main>


        <div class="menu">
            <p>Tubulações</p>
            <div class="slider">
                <div class="slides">   
                    <img src = "imagens/tubulacao2.png">
                    <img src = "imagens/tubulacao3.png">
                    <img src="imagens/06b6548f-ab7f-4875-8bc0-f927872c195f.png">
                </div>
            </div>
        </div>

        <div class="menu">
            <p>Calhas </p>
            <div class="slider">
                <div class="slides">
                    <img src = "imagens/calhas2.png">
                    <img src="imagens/calhas-nova.png">
                    <img src="imagens/6dc7937a-d4c6-45aa-a5bd-f17d70439957.png">
                </div>
            </div>
        </div>

        <div class="menu">
            <p>Coifas</p>
            <div class="slider">
                <div class="slides">
                    <img src="imagens/coifa02.jpg" alt="Coifa 1">
                    <img src="imagens/coifa04.jpg" alt="Coifa 2">
                    <img src="imagens/coifa03.png" alt="Coifa 3">
                </div>
            </div>
        </div>

        <div class="menu">
            <p>Rufos</p>
            <div class="slider">
                <div class="slides">
                    <img src = "imagens/rufos1.png">
                    <img src="imagens/rufo02.jpg" style="border-radius: 20px;">
                    <img src = "imagens/rufos3.png">
                </div>
            </div>
        </div>
    </main>
</body>

</html>

<script>
    const canvas = document.getElementById("rain");
    const ctx = canvas.getContext("2d");

    let W = window.innerWidth;
    let H = window.innerHeight;

    canvas.width = W;
    canvas.height = H;

    let drops = [];

    function makeRaindrop(initial = true) {
        return {
            x: Math.random() * W,
            y: initial ? Math.random() * H : -20,

            len: Math.random() * 25 + 15,     // um pouco maior
            speed: Math.random() * 6 + 8,     // MAIS rápido

            width: Math.random() * 1.2 + 0.6,
            alpha: Math.random() * 0.5 + 0.4,

            dx: Math.random() * 0.4 - 0.2,    // quase reto (bem menos inclinado)
            dy: Math.random() * 6 + 10        // cai mais rápido pra baixo
        };
    }

    for (let i = 0; i < 150; i++) {
        drops.push(makeRaindrop());
    }

    function drawRain() {
        ctx.save();
        drops.forEach(d => {
            ctx.globalAlpha = d.alpha;
            ctx.strokeStyle = '#a8ccee';
            ctx.lineWidth = d.width;
            ctx.beginPath();
            ctx.moveTo(d.x, d.y);
            ctx.lineTo(
                d.x - d.dx * (d.len / d.speed),
                d.y - d.dy * (d.len / d.speed)
            );
            ctx.stroke();

            d.x += d.dx;
            d.y += d.dy;

            if (d.y > H + 20) {
                Object.assign(d, makeRaindrop(false));
            }
        });
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, W, H);
        drawRain();
        requestAnimationFrame(animate);
    }

    animate();
</script>
