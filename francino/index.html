<!DOCTYPE html>

<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Francino Calhas</title>
    <link rel="stylesheet" href="css.css">
    <meta property="og:image"
        content="https://francinocalhas.com.br/wp-content/uploads/2023/04/francino-calhas-logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="imagens/francino-calhas-logo.png">

    <style>
        body {
            background: linear-gradient(135deg, #0A3D62, #000);
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            background-attachment: fixed;
            min-height: 100%;
            font-family: "DM Sans", "Inter", sans-serif;
        }

        header {
            background: var(--cinza-escuro);
            backdrop-filter: blur(10px);
            background-position: center;
            background-size: cover;
            top: 0;
            width: 100%;
            height: 80px;
            position: fixed;
            display: flex;
            justify-content: space-between;
        }

        header h1 {
            color: White;
            font-weight: 700;
        }

        .hero {
            background: linear-gradient(135deg, rgba(10, 61, 98, 0.4), rgba(0, 0, 0, 0.8)), url("imagens/header.jpg");
            background-position: 1% 90%;
            background-repeat: no-repeat;
            background-size: cover;
            min-height: 80vh;
            padding-top: 80px;
            align-content: center;
        }

        .hero h1,
        h2 {
            color: white;
            font-weight: 700;
            text-align: center;
            z-index: 2;
            font-size: 2rem;
        }

        .hero h2 {
            font-size: 1.8rem;
            color: var(--cinza-claro)
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: 700;
        }

        .logo img {
            margin-left: 20px;
            height: 40px;
        }

        nav {
            align-items: center;
            display: flex;
            gap: 30px;
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: var(--cinza-claro);
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--cinza-claro);
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }

        nav a:hover::after {
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <img src="imagens/francino-calhas-logo.png">
            <span>Francino Calhas</span>
        </div>

        <nav>
            <a href="#inicio">Início</a>
            <a href="#servico">Serviços</a>
            <a href="#empresa">A empresa</a>
            <a href="#contato">Contato</a>
        </nav>
    </header>
    <div class="hero">
        <H1>Calhas, coifas e rufos.</H1>
        <h2>Melhor preço de Belo Horizonte, cobrimos qualquer orçamento.</h2>
    </div>


</body>

</html>
